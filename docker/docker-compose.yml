name: enviroplus

services:
  grafana:
    image: grafana/grafana:latest
    user: "1000:1000"
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - /home/pistrommy/projects/enviroplus:/data/enviroplus
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
      - ./tls:/etc/grafana/tls:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/grafana/tls/bspilhx.tail32dc7b.ts.net.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/tls/bspilhx.tail32dc7b.ts.net.key
      - GF_SERVER_DOMAIN=bspilhx.tail32dc7b.ts.net
      - GF_SERVER_ROOT_URL=https://bspilhx.tail32dc7b.ts.net:3000
    restart: unless-stopped

volumes:
  grafana-data:
